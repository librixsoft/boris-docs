site_name: Boris AI Documentation
site_description: Boris AI Documentation
site_author: Your Name
site_url: https://librixsoft.github.io/boris-docs

# Repository
repo_name: librixsoft/boris-docs
repo_url: https://github.com/librixsoft/boris-docs

# Theme
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - navigation.top
    - search.suggest
    - search.highlight

# Navigation
nav:
  - Home: index.md
  - Quick Guide:
    - Installation: guide/installation.md
    - Configuration: guide/configuration.md
    - Getting Started: guide/getting-started.md
  - Documentation:
    - Interface: documentation/interface.md
    - API: documentation/api.md
    - Examples: documentation/examples.md
    - Reference: documentation/reference.md
  
# Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - codehilite:
      css_class: highlight

# Plugins
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

# Extra CSS
extra_css:
  - stylesheets/extra.css

# Extra JavaScript
extra_javascript:
  - javascripts/extra.js
